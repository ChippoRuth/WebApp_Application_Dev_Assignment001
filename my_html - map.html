<!doctype html>
<html>
  <head>
    <title>My HTML</title>
    <link
      rel="stylesheet"
      href="https://openlayers.org/en/v4.6.5/css/ol.css"
      type="text/css"
    />

    <style>
      /* 1. Make a wrapper to act as the positioning anchor */
      .map-container {
        position: relative;
        width: 100%;
        height: 1500px; /* Adjust as needed */
      }

      .ol-tooltip {
        position: relative;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 4px;
        color: white;
        padding: 4px 8px;
        opacity: 0.85;
        white-space: nowrap;
        font-size: 12px;
        font-family: Arial, sans-serif;
      }
      .ol-tooltip-static {
        background-color: #ffcc33;
        color: black;
        border: 1px solid white;
        font-weight: bold;
      }

      .map {
        width: 100%;
        height: 100%;
      }

      /* 2. Style your location button to float inside the map */
      #my-location-btn {
        position: absolute;
        top: 10px;
        left: 50px;
        z-index: 1000; /* Keeps it above the map tiles */
        background: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 5px;
        cursor: pointer;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
      }

      /* Shrink your SVG so it fits nicely as an icon */
      #my-location-btn svg {
        width: 24px;
        height: 24px;
        display: block;
      }
    </style>
  </head>
  <body>
    <button id="zoom-out">Zoom out</button>
    <button id="zoom-in">Zoom in</button>
    <button id="reset">Reset</button>
    <button id="left">Left</button>
    <button id="right">Right</button>
    <button id="up">Up</button>
    <button id="down">Down</button>
    <button id="measure-distance">Measure Distance</button>

    <div class="map-container">
      <div id="map" class="map" tabindex="0"></div>

      <button id="my-location-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="#000000"
        >
          <path
            d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
          />
          <circle cx="12" cy="9" r="3" fill="white" />
        </svg>
      </button>
    </div>

    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=requestAnimationFrame,Element.prototype.classList,URL"></script>
    <script src="https://openlayers.org/en/v4.6.5/build/ol.js"></script>
    <script src="mainmap.js"></script>
  </body>
</html>
